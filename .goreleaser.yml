project_name: aeo

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: aeo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "aeo_{{ .Os }}_{{ .Arch }}"
    files:
      - none*  # binary only, no extra files in archive

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: kithlabs
    name: aeo
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: kithlabs
      name: homebrew-aeo
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/kithlabs/aeo"
    description: "GEO CLI for AI search engine visibility"
    license: "Apache-2.0"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
